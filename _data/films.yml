ebc-night:
  title: "Expedição ao Everest - V8.Tech"
  year: 2025
  category: "Documentary"
  client: "Rodrigo Xavier"
  duration: "7:55 min"
  thumbnail: "/assets/css/images/films/everest.jpg"
  poster: "/assets/css/images/films/everest.jpg"
  youtube: "https://www.youtube.com/embed/RcA4YabQgxU?si=SZ89xV4mmoAIjPqD"
  hover_video: "/assets/css/video/banner2.mp4"  
  description: "Expedition to Everest (May/2025), led by Rodrigo Xavier, CEO of V8.Tech, with the bold objective of reaching the top of the world in under 30 days, challenging physical and mental limits in one of the most intense journeys ever undertaken by a Brazilian. After a month of pre-acclimatization in a hypoxic chamber and meticulously planned logistics, Rodrigo faced extreme temperatures, death zones, aerial rescues, and his own human vulnerability at over 8,000 meters of altitude. His journey took place on the greatest symbol of world mountaineering, set against a backdrop of fear, overcoming, and love for life and family."
  gallery:
    - "/assets/css/images/films/dacio/gallery-1.jpg"
    - "/assets/css/images/films/dacio/gallery-2.jpg"
    - "/assets/css/images/films/dacio/gallery-3.jpg"
    - "/assets/css/images/films/dacio/gallery-4.jpg"
    - "/assets/css/images/films/dacio/gallery-5.jpg"
    - "/assets/css/images/films/dacio/gallery-6.jpg"
    - "/assets/css/images/films/dacio/gallery-7.jpg"
  

  director: "Murilo Vargas"
  cinematography: "Sunil Tamang"
  editor: "Nunes"
  producer: "Elevation Lab"
  location: "Nepal"
  
  tags:
    - drone
    - documentary
    - himalayas
    
